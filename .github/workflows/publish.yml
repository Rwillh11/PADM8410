on:
  push:
    branches: main

name: Render and deploy Quarto site

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::knitr
            any::rmarkdown
            any::patchwork
            any::gridExtra
            any::marginaleffects
            any::fixest
            any::lme4
            any::MASS
            any::AER
            any::nnet
            any::dagitty
            any::ggdag
            any::gapminder
            any::ggrepel
            any::gt
            any::palmerpenguins
            any::plot3D
            any::rdrobust
            any::rddensity
            any::scales
            any::mediation
            any::igraph
            any::reshape2
            any::infer

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
